name: quick_drop
description: A local peer-to-peer file and folder sharing app for Windows.
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.0.0
  path_provider: ^2.1.2
  cryptography: ^2.7.0
  path: ^1.9.0
  archive: ^3.3.7
  sodium_libs: ^2.2.1
  sodium: ^2.3.1+1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
